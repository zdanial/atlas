services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: butterfly
    ports:
      - "6432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  claude-code:
    build:
      context: .
      dockerfile: services/claude-code/Dockerfile
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      PORT: 3002
    volumes:
      # Mount host home read-only so the cartographer can read user repos
      # via the same path the backend uses (see backend.volumes).
      - ${HOST_HOME:-${HOME}}:/host:ro
      # Mount the user's claude CLI auth session read-write so the agent
      # picks up the host login (subscription / oauth) and can refresh tokens.
      - ${HOST_HOME:-${HOME}}/.claude:/host/.claude:rw
    ports:
      - "6300:3002"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      claude-code:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/butterfly
      RUST_LOG: butterfly_server=debug,info
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAUDE_CODE_URL: http://claude-code:3002
      HOME: /host
    volumes:
      # Mount host home read-only so the local-folder picker / cartographer
      # can browse and read source folders on the developer's machine.
      - ${HOST_HOME:-${HOME}}:/host:ro
    ports:
      - "6100:3001"

  frontend:
    image: node:22-slim
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@10 --activate && pnpm install && pnpm dev --host 0.0.0.0"
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      PUBLIC_API_URL: http://localhost:6100
      BACKEND_INTERNAL_URL: http://backend:3001
      ORIGIN: http://localhost:6200
    ports:
      - "6200:5173"

volumes:
  pgdata:
  frontend_node_modules:
