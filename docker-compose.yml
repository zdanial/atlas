services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: atlas
    ports:
      - "6432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/atlas
      RUST_LOG: info
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "6100:3001"

  frontend:
    image: node:22-slim
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@10 --activate && pnpm install && pnpm dev --host 0.0.0.0"
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      PUBLIC_API_URL: http://localhost:6100
      ORIGIN: http://localhost:6200
    ports:
      - "6200:5173"

volumes:
  pgdata:
  frontend_node_modules:
